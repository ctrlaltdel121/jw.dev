<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Site.Title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />
</head>
<body>
  <main class="container">
    <div class="profile">
      {{ if .Site.Params.gravatarEmail }}
      <img class="avatar" src="https://www.gravatar.com/avatar/{{ md5 .Site.Params.gravatarEmail }}?s=160" alt="{{ .Site.Params.name | default .Site.Title }}" />
      {{ else }}
      <div class="avatar">{{ .Site.Params.initials | default "JW" }}</div>
      {{ end }}
      <h1 class="name">{{ .Site.Params.name | default .Site.Title }}</h1>
      <p class="tagline">{{ .Site.Params.tagline }}</p>
      {{ with .Site.Params.about }}
      <p class="about">{{ . }}</p>
      {{ end }}
      <nav class="links" aria-label="Social links">
        {{ range .Site.Params.links }}
        <a
          href="{{ .url }}"
          class="link-card"
          {{ if not (hasPrefix .url "mailto:") }}target="_blank" rel="noopener noreferrer"{{ end }}
        >{{ .label }}</a>
        {{ end }}
      </nav>
    </div>
  </main>
</body>
</html>
